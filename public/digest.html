<body>
    <div class="container">
        <div class="header">
            <h1>📰 התקציר היומי שלך</h1>
            <div class="date" id="currentDate"></div>
        </div>

        <div id="statsContainer"></div>
        <div id="loadingContainer" class="loading">
            <div class="loading-spinner"></div>
            <p>טוען את התקציר האישי שלך...</p>
        </div>

        <div id="errorContainer"></div>
        <div id="articlesContainer" class="articles-container"></div>

        <div id="footerContainer"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const digestId = urlParams.get('id');
        const userId = urlParams.get('user');

        let readArticles = new Set();

        try {
            const stored = localStorage.getItem('readArticles');
            if (stored) {
                readArticles = new Set(JSON.parse(stored));
            }
        } catch (e) {
            console.error('Failed to load read articles from localStorage', e);
        }

        function formatDate() {
            const days = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
            const months = ['ינואר', 'פברואר', 'מרץ', 'אפריל', 'מאי', 'יוני', 'יולי', 'אוגוסט', 'ספטמבר', 'אוקטובר', 'נובמבר', 'דצמבר'];
            
            const now = new Date();
            const dayName = days[now.getDay()];
            const day = now.getDate();
            const month = months[now.getMonth()];
            const year = now.getFullYear();
            
            return `יום ${dayName}, ${day} ב${month} ${year}`;
        }

        function formatTime(dateString) {
            try {
                const date = new Date(dateString);
                const now = new Date();
                const diffMs = now - date;
                const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
                const diffMinutes = Math.floor(diffMs / (1000 * 60));

                if (diffMinutes < 60) {
                    return `לפני ${diffMinutes} דקות`;
                } else if (diffHours < 24) {
                    return `לפני ${diffHours} שעות`;
                } else {
                    const diffDays = Math.floor(diffHours / 24);
                    return `לפני ${diffDays} ימים`;
                }
            } catch (e) {
                return 'זה עתה';
            }
        }

        function getCategoryEmoji(category) {
            const emojiMap = {
                'חדשות': '📰',
                'כלכלה': '💰',
                'ספורט': '⚽',
                'טכנולוגיה': '💻',
                'תרבות': '🎭',
                'בריאות': '🏥',
                'מדע': '🔬',
                'בידור': '🎬'
            };
            return emojiMap[category] || '📄';
        }

        async function trackClick(articleId) {
            if (!userId || !digestId) return;

            readArticles.add(articleId);
            try {
                localStorage.setItem('readArticles', JSON.stringify([...readArticles]));
            } catch (e) {
                console.error('Failed to save to localStorage', e);
            }

            try {
                await fetch(`/api/track`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: userId,
                        articleId: articleId,
                        digestId: digestId,
                        timestamp: new Date().toISOString()
                    })
                });
            } catch (e) {
                console.error('Failed to track click', e);
            }
        }

        function handleArticleClick(article) {
            trackClick(article.id);
            
            const card = document.querySelector(`[data-article-id="${article.id}"]`);
            if (card) {
                card.classList.add('read');
                const title = card.querySelector('.article-title');
                if (title && !title.querySelector('.read-indicator')) {
                    const indicator = document.createElement('span');
                    indicator.className = 'read-indicator';
                    indicator.textContent = 'נקרא';
                    title.insertBefore(indicator, title.firstChild);
                }
            }

            window.open(article.link, '_blank', 'noopener,noreferrer');
        }

        function renderStats(digest) {
            const statsContainer = document.getElementById('statsContainer');
            const totalArticles = digest.articles.length;
            const readCount = digest.articles.filter(a => readArticles.has(a.id)).length;
            const avgScore = digest.articles.reduce((sum, a) => sum + (a.score || 0), 0) / totalArticles;

            statsContainer.innerHTML = `
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-value">${totalArticles}</span>
                        <div class="stat-label">כתבות מותאמות</div>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">${readCount}</span>
                        <div class="stat-label">נקראו</div>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">${Math.round(avgScore * 100)}%</span>
                        <div class="stat-label">התאמה ממוצעת</div>
                    </div>
                </div>
            `;
        }

        function renderArticles(digest) {
            const articlesContainer = document.getElementById('articlesContainer');
            
            if (!digest.articles || digest.articles.length === 0) {
                articlesContainer.innerHTML = `
                    <div class="error">
                        <h2>אין כתבות להצגה</h2>
                        <p>נסה שוב מאוחר יותר</p>
                    </div>
                `;
                return;
            }

            articlesContainer.innerHTML = digest.articles.map(article => {
                const isRead = readArticles.has(article.id);
                const readClass = isRead ? 'read' : '';
                const readIndicator = isRead ? '<span class="read-indicator">נקרא</span>' : '';
                const scorePercent = Math.round((article.score || 0) * 100);
                const categoryEmoji = getCategoryEmoji(article.category);

                return `
                    <div class="article-card ${readClass}" data-article-id="${article.id}">
                        <div class="article-score">${scorePercent}%</div>
                        <div class="article-category">${categoryEmoji} ${article.category || 'חדשות'}</div>
                        <h2 class="article-title">
                            ${readIndicator}
                            ${article.title}
                        </h2>
                        <p class="article-description">${article.description || ''}</p>
                        <div class="article-meta">
                            <span class="article-time">${formatTime(article.pubDate)}</span>
                            <span class="article-source">ynet</span>
                        </div>
                    </div>
                `;
            }).join('');

            digest.articles.forEach(article => {
                const card = document.querySelector(`[data-article-id="${article.id}"]`);
                if (card) {
                    card.addEventListener('click', () => handleArticleClick(article));
                }
            });
        }

        function renderFooter() {
            const footerContainer = document.getElementById('footerContainer');
            footerContainer.innerHTML = `
                <div class="footer">
                    <p>התקציר שלך מותאם במיוחד עבורך על סמך הרגלי הקריאה שלך</p>
                    <p>ככל שתקרא יותר כתבות, התקציר יהיה מדויק ומותאם יותר</p>
                    <a href="/">חזרה לדף הבית</a>
                </div>
            `;
        }

        async function loadDigest() {
            document.getElementById('currentDate').textContent = formatDate();

            if (!digestId) {
                document.getElementById('loadingContainer').style.display = 'none';
                document.getElementById('errorContainer').innerHTML = `
                    <div class="error">
                        <h2>⚠️ קישור לא תקין</h2>
                        <p>לא נמצא מזהה תקציר בכתובת</p>
                        <p><a href="/" style="color: #667eea; font-weight: bold;">חזרה לדף הבית</a></p>
                    </div>
                `;
                return;
            }

            try {
                const url = userId 
                    ? `/api/digest/${digestId}?user=${encodeURIComponent(userId)}`
                    : `/api/digest/${digestId}`;

                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const digest = await response.json();

                document.getElementById('loadingContainer').style.display = 'none';
                
                renderStats(digest);
                renderArticles(digest);
                renderFooter();

            } catch (error) {
                console.error('Failed to load digest:', error);
                document.getElementById('loadingContainer').style.display = 'none';
                document.getElementById('errorContainer').innerHTML = `
                    <div class="error">
                        <h2>⚠️ שגיאה בטעינת התקציר</h2>
                        <p>${error.message}</p>
                        <p>נסה לרענן את הדף או לחזור מאוחר יותר</p>
                        <p><a href="/" style="color: #667eea; font-weight: bold;">חזרה לדף הבית</a></p>
                    </div>
                `;
            }
        }

        loadDigest();
    </script>
</body>
</html>
